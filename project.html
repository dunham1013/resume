<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yen - 말싸움 시뮬레이션 AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #e9d5ff,
        #fbcfe8,
        #bfdbfe
    );
    padding:20px;
}

.page{
    display:none;
    width:100%;
    max-width:500px;
}

.page.active{
    display:block;
}

.card{
    background:white;
    border-radius:32px;
    padding:32px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.logo-wrap img{
    width:220px;
    max-width:100%;
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:700;
    background:linear-gradient(
        90deg,
        #9333ea,
        #ec4899
    );
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:10px;
}

.desc{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.label{
    font-size:14px;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:2px solid #ddd;
    margin-bottom:25px;
    outline:none;
}

input:focus{
    border-color:#9333ea;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:25px;
}

.tone{
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:white;
    border:2px solid #ddd;
    transition:.2s;
    font-size:15px;
}

.tone.active{
    background:#9333ea;
    color:white;
    border-color:#9333ea;
}

.btn{
    width:100%;
    border:none;
    padding:15px;
    border-radius:14px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.start-btn{
    background:linear-gradient(
        90deg,
        #9333ea,
        #ec4899
    );
}

.pass-btn{
    background:linear-gradient(
        90deg,
        #facc15,
        #eab308
    );
}

.back-btn{
    background:#666;
}

.chat-header{
    background:linear-gradient(
        90deg,
        #9333ea,
        #ec4899
    );
    color:white;
    padding:15px;
    border-radius:20px 20px 0 0;
}

.chat-body{
    background:white;
    padding:20px;
    border-radius:0 0 20px 20px;
    min-height:450px;
}

.info{
    text-align:center;
    background:#f3e8ff;
    color:#7e22ce;
    padding:10px;
    border-radius:20px;
    margin-bottom:20px;
    font-size:14px;
}

.msg{
    max-width:75%;
    padding:12px;
    border-radius:16px;
    margin-bottom:10px;
}

.opponent{
    background:#f3f4f6;
}

.ai{
    background:linear-gradient(
        90deg,
        #9333ea,
        #ec4899
    );
    color:white;
    margin-left:auto;
}

.plan{
    border:2px solid #eee;
    border-radius:20px;
    padding:20px;
    margin-top:15px;
}

.plan h3{
    margin-bottom:10px;
}

.plan ul{
    padding-left:20px;
}

</style>
</head>
<body>

<!-- 메인 -->
<div class="page active" id="setup">

<div class="card">

<div class="logo-wrap">
<img src="logo.jpg" alt="yen">
</div>

<h1 class="title">
말싸움 시뮬레이션 AI
</h1>

<p class="desc">
주제를 입력하면 AI가 실시간으로 말싸움을 시뮬레이션합니다
</p>

<div class="label">
말싸움 주제를 입력하세요
</div>

<input
id="topic"
placeholder="예: 치킨 vs 피자">

<div class="label">
시뮬레이션 스타일
</div>

<div class="grid">

<button class="tone active"
onclick="selectTone(this,'논리적')">
🧠 논리적
</button>

<button class="tone"
onclick="selectTone(this,'감성적')">
❤️ 감성적
</button>

<button class="tone"
onclick="selectTone(this,'냉정한')">
❄️ 냉정한
</button>

<button class="tone"
onclick="selectTone(this,'유머러스')">
😄 유머러스
</button>

</div>

<button
class="btn start-btn"
onclick="startSimulation()">
시뮬레이션 시작
</button>

<button
class="btn pass-btn"
onclick="openPass()">
👑 yen pass 시작하기
</button>

</div>
</div>

<!-- 채팅 -->
<div class="page" id="chat">

<div class="chat-header">
<h3>💬 말싸움 시뮬레이션</h3>
<small>진행 중...</small>
</div>

<div class="chat-body">

<div
id="chatInfo"
class="info">
</div>

<div class="msg opponent">
치킨이 더 맛있지 않냐?
</div>

<div class="msg ai">
그건 사람마다 다르지.
</div>

<div class="msg opponent">
아니 치킨은 못 참지.
</div>

<div class="msg ai">
피자도 만만치 않은데?
</div>

<button
class="btn back-btn"
onclick="goHome()">
설정으로 돌아가기
</button>

</div>
</div>

<!-- 요금제 -->
<div class="page" id="pricing">

<div class="card">

<h1 class="title">
👑 yen pass
</h1>

<p class="desc">
더 많은 대화와 더 나은 경험
</p>

<div class="plan">
<h3>yen pass 1</h3>
<ul>
<li>내용 2배 확장</li>
<li>광고 축소</li>
</ul>
</div>

<div class="plan">
<h3>yen pass 2</h3>
<ul>
<li>내용 3배 확장</li>
<li>광고 제거</li>
</ul>
</div>

<button
class="btn back-btn"
onclick="goHome()">
나중에 하기
</button>

</div>
</div>

<script>

let selectedTone = "논리적";

function selectTone(btn,tone){

    document
      .querySelectorAll(".tone")
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    selectedTone = tone;
}

function showPage(id){

    document
      .querySelectorAll(".page")
      .forEach(p=>p.classList.remove("active"));

    document
      .getElementById(id)
      .classList.add("active");
}

function startSimulation(){

    const topic =
      document.getElementById("topic").value || "주제 없음";

    document.getElementById("chatInfo").innerHTML =
      "주제 : " + topic +
      " | 스타일 : " + selectedTone;

    showPage("chat");
}

function openPass(){
    showPage("pricing");
}

function goHome(){
    showPage("setup");
}

</script>

</body>
</html>
